<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --yae: #D4537E; --yae-light: #FBEAF0; --yae-dark: #72243E;
  --jae: #378ADD; --jae-light: #E6F1FB; --jae-dark: #0C447C;
  --gae: #1D9E75; --gae-light: #E1F5EE; --gae-dark: #085041;
}
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #fff; color: #1a1a1a; }
.wrap { padding: 2rem 1rem; max-width: 660px; margin: 0 auto; }
.badge-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 1rem; }
.badge { font-size: 12px; padding: 4px 12px; border-radius: 99px; font-weight: 500; }
.badge-yae { background: var(--yae-light); color: var(--yae-dark); }
.badge-jae { background: var(--jae-light); color: var(--jae-dark); }
.badge-gae { background: var(--gae-light); color: var(--gae-dark); }
h1 { font-size: 22px; font-weight: 600; text-align: center; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: #666; text-align: center; margin-bottom: 1.5rem; }
.char-row { display: flex; justify-content: center; gap: 16px; margin-bottom: 1.5rem; flex-wrap: wrap; }
.char-card {
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  padding: 16px 12px; border-radius: 12px; border: 1.5px solid;
  width: 170px; flex-shrink: 0;
}
.char-card img { width: 120px; height: 120px; object-fit: contain; }
.char-name { font-size: 13px; font-weight: 600; }
.char-role { font-size: 11px; text-align: center; line-height: 1.5; }
.start-btn { display: block; margin: 0 auto; background: #1a1a1a; color: #fff; border: none; border-radius: 8px; padding: 12px 40px; font-size: 15px; cursor: pointer; }
.start-btn:hover { opacity: 0.82; }
.prog-wrap { background: #eee; border-radius: 99px; height: 4px; margin-bottom: 2rem; }
.prog-bar { height: 4px; border-radius: 99px; background: #555; transition: width 0.4s; }
.q-num { font-size: 12px; color: #999; margin-bottom: 6px; }
.q-text { font-size: 16px; font-weight: 600; margin-bottom: 1.25rem; line-height: 1.6; }
.opts { display: flex; flex-direction: column; gap: 10px; margin-bottom: 2rem; }
.opt-btn { background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 14px 16px; text-align: left; font-size: 14px; cursor: pointer; line-height: 1.5; display: flex; align-items: flex-start; gap: 10px; }
.opt-btn:hover { background: #f5f5f5; }
.opt-btn.sel-A { background: var(--yae-light); border-color: var(--yae); color: var(--yae-dark); }
.opt-btn.sel-B { background: var(--jae-light); border-color: var(--jae); color: var(--jae-dark); }
.opt-btn.sel-C { background: var(--gae-light); border-color: var(--gae); color: var(--gae-dark); }
.opt-label { font-weight: 600; font-size: 13px; flex-shrink: 0; }
.nav-row { display: flex; justify-content: space-between; gap: 10px; }
.nav-btn { background: transparent; border: 1px solid #ddd; border-radius: 8px; padding: 8px 20px; font-size: 14px; cursor: pointer; }
.nav-btn:disabled { opacity: 0.3; cursor: default; }
.next-btn { background: #1a1a1a; color: #fff; border: none; border-radius: 8px; padding: 10px 28px; font-size: 14px; cursor: pointer; }
.next-btn:disabled { opacity: 0.3; cursor: default; }
.result-card { border-radius: 12px; padding: 2rem 1.5rem; border: 1.5px solid; margin-bottom: 1.5rem; text-align: center; }
.result-card img { width: 130px; height: 130px; object-fit: contain; margin-bottom: 0.75rem; }
.result-type { font-size: 26px; font-weight: 700; margin-bottom: 4px; }
.result-tag { font-size: 13px; font-weight: 600; padding: 4px 14px; border-radius: 99px; display: inline-block; margin-bottom: 1rem; }
.result-desc { font-size: 14px; color: #555; line-height: 1.8; }
.score-row { display: flex; gap: 10px; justify-content: center; margin-bottom: 1.5rem; }
.score-card { border-radius: 10px; padding: 12px 20px; min-width: 90px; border: 1px solid; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.score-card.yae { background: var(--yae-light); border-color: var(--yae); }
.score-card.jae { background: var(--jae-light); border-color: var(--jae); }
.score-card.gae { background: var(--gae-light); border-color: var(--gae); }
.score-label { font-size: 12px; font-weight: 500; }
.score-card.yae .score-label, .score-card.yae .score-num { color: var(--yae-dark); }
.score-card.jae .score-label, .score-card.jae .score-num { color: var(--jae-dark); }
.score-card.gae .score-label, .score-card.gae .score-num { color: var(--gae-dark); }
.score-num { font-size: 26px; font-weight: 700; }
.restart-btn { display: block; margin: 0 auto; background: transparent; border: 1px solid #ddd; border-radius: 8px; padding: 10px 28px; font-size: 14px; cursor: pointer; }
.submit-box { background: #f9f9f9; border: 1px solid #eee; border-radius: 10px; padding: 1.25rem 1rem; margin-bottom: 1rem; text-align: center; }
.submit-box p { font-size: 13px; color: #555; margin-bottom: 10px; line-height: 1.6; }
.submit-box input[type=text] { width: 100%; max-width: 280px; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; margin-bottom: 10px; outline: none; display: block; margin-left: auto; margin-right: auto; box-sizing: border-box; }
.submit-box input[type=text]:focus { border-color: #888; }
.submit-btn { background: #1a1a1a; color: #fff; border: none; border-radius: 8px; padding: 10px 28px; font-size: 14px; cursor: pointer; }
.submit-btn:disabled { opacity: 0.4; cursor: default; }
.submit-msg { font-size: 13px; margin-top: 8px; min-height: 20px; }
.submit-box { background: #f9f9f9; border: 1px solid #eee; border-radius: 10px; padding: 1.25rem 1rem; margin-bottom: 1rem; text-align: center; }
.submit-box p { font-size: 13px; color: #555; margin-bottom: 10px; line-height: 1.6; }
.submit-box input { width: 100%; max-width: 280px; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; margin-bottom: 10px; outline: none; display: block; margin-left: auto; margin-right: auto; }
.submit-box input:focus { border-color: #888; }
.submit-btn { background: #1a1a1a; color: #fff; border: none; border-radius: 8px; padding: 10px 28px; font-size: 14px; cursor: pointer; }
.submit-btn:disabled { opacity: 0.4; cursor: default; }
.share-box { max-width: 500px; margin: 0 auto 16px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
.share-btn { display: flex; align-items: center; gap: 6px; padding: 10px 18px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; text-decoration: none; transition: opacity 0.15s; }
.share-btn:hover { opacity: 0.85; }
.share-copy { background: #f0f0f0; color: #333; }
.share-kakao { background: #FEE500; color: #3C1E1E; }
.share-twitter { background: #000; color: #fff; }
.copy-done { background: #e6f4ea !important; color: #1e7e34 !important; } { animation: fadeIn 0.35s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.hidden { display: none; }
</style>

// ✅ 구글 앱스 스크립트 웹앱 배포 URL을 여기에 입력하세요
const GAS_URL = "여기에_구글_앱스_스크립트_URL_입력";

function copyLink(type) {
  const url = window.location.href;
  const text = `나는 "${type}" 유형이에요! 당신은 어떤 유형인지 테스트해보세요 👉 ${url}`;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById("copy-btn");
      btn.textContent = "✓ 복사됐어요!";
      btn.classList.add("copy-done");
      setTimeout(() => { btn.textContent = "🔗 링크 복사"; btn.classList.remove("copy-done"); }, 2000);
    });
  } else {
    const ta = document.createElement("textarea");
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand("copy"); document.body.removeChild(ta);
    const btn = document.getElementById("copy-btn");
    btn.textContent = "✓ 복사됐어요!";
    btn.classList.add("copy-done");
    setTimeout(() => { btn.textContent = "🔗 링크 복사"; btn.classList.remove("copy-done"); }, 2000);
  }
}
function shareTwitter(type) {
  const url = encodeURIComponent(window.location.href);
  const text = encodeURIComponent(`나는 "${type}" 유형이에요! 당신은 어떤 유형인지 테스트해보세요`);
  window.open(`https://twitter.com/intent/tweet?text=${text}&url=${url}`, "_blank");
}
async function submitResult(name, type) {
  const btn = document.getElementById("submit-btn");
  const msg = document.getElementById("submit-msg");
  if (!name.trim()) { msg.style.color="#e00"; msg.textContent="닉네임을 입력해주세요!"; return; }
  btn.disabled = true;
  msg.style.color="#555"; msg.textContent="저장 중...";
  try {
    const fd = new FormData();
    fd.append("name", name.trim());
    fd.append("type", type);
    await fetch(GAS_URL, { method:"POST", body: fd, mode:"no-cors" });
    msg.style.color="var(--gae-dark)"; msg.textContent="✓ 결과가 저장되었습니다!";
    btn.textContent="저장 완료";
  } catch(e) {
    msg.style.color="#e00"; msg.textContent="저장에 실패했습니다. 다시 시도해주세요.";
    btn.disabled = false;
  }
}

  C:{type:"걔 (Gae)",title:"동네 탐험가",bg:"var(--gae-light)",border:"var(--gae)",tbg:"var(--gae-light)",tc:"var(--gae-dark)",desc:"발로 뛰는 이야기 수집가인 당신!<br>사람 사이의 관계와 현장의 생동감을 사랑하는 타입입니다.<br>어디서든 사람들을 연결하고<br>공간과 커뮤니티에 활기를 불어넣습니다."},
  Mixed:{type:"올라운더",title:"상황에 따라 변하는 멀티플레이어",bg:"#f5f5f5",border:"#ccc",tbg:"#eee",tc:"#555",desc:"얘·쟤·걔의 역할을 상황에 따라 유연하게 오가는 당신!<br>감각, 기록, 관계 — 세 가지를 모두 갖춘<br>팀의 중심을 잡아주는 소중한 존재입니다."}
};
let cur=0, ans=new Array(10).fill(null);
function startQuiz(){
  document.getElementById("intro-page").classList.add("hidden");
  const qp=document.getElementById("quiz-page");
  qp.classList.remove("hidden"); qp.classList.add("fade-in"); render();
}
function render(){
  const q=questions[cur];
  document.getElementById("progress").style.width=(cur/questions.length*100)+"%";
  const area=document.getElementById("q-area");
  area.className="fade-in"; void area.offsetWidth;
  area.innerHTML=`<p class="q-num">질문 ${cur+1} / ${questions.length}</p>
    <p class="q-text">${q.q}</p>
    <div class="opts">${q.opts.map(o=>`
      <button class="opt-btn ${ans[cur]===o.k?'sel-'+o.k:''}" onclick="select('${o.k}')">
        <span class="opt-label">${o.k}</span><span>${o.t}</span>
      </button>`).join("")}</div>`;
  document.getElementById("prev-btn").disabled=cur===0;
  const nb=document.getElementById("next-btn");
  nb.textContent=cur===questions.length-1?"결과 보기 →":"다음 →";
  nb.disabled=ans[cur]===null;
}
function select(k){ ans[cur]=k; render(); }
function navigate(d){
  if(d===1&&cur===questions.length-1){ showResult(); return; }
  cur=Math.max(0,Math.min(questions.length-1,cur+d)); render();
}
function showResult(){
  const cnt={A:0,B:0,C:0};
  ans.forEach(a=>{if(a)cnt[a]++;});
  const mx=Math.max(cnt.A,cnt.B,cnt.C);
  const top=["A","B","C"].filter(k=>cnt[k]===mx);
  let w= top.length===1 ? top[0] : "Mixed";
  const r=results[w];
  document.getElementById("quiz-page").classList.add("hidden");
  const rp=document.getElementById("result-page");
  rp.classList.remove("hidden"); rp.className="fade-in";
  const imgHtml=w!=="Mixed"?`<img src="${IMGS[w]}" alt="${r.type}" />`:`<div style="font-size:56px;margin-bottom:0.5rem;">🌀</div>`;
  rp.innerHTML=`<div class="result-card" style="background:${r.bg};border-color:${r.border};">
    ${imgHtml}
    <div class="result-type">${r.type}</div>
    <div class="result-tag" style="background:${r.tbg};color:${r.tc};">${r.title}</div>
    <div class="result-desc">${r.desc}</div>
  </div>
  <div class="score-row">
    <div class="score-card yae"><span class="score-label">얘 (Yae)</span><span class="score-num">${cnt.A}</span></div>
    <div class="score-card jae"><span class="score-label">쟤 (Jae)</span><span class="score-num">${cnt.B}</span></div>
    <div class="score-card gae"><span class="score-label">걔 (Gae)</span><span class="score-num">${cnt.C}</span></div>
  </div>
  <div class="newsletter-container" style="max-width: 500px; margin: 24px auto; padding: 25px; border: 2px solid #eee; border-radius: 15px; background-color: #ffffff; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
    <div class="psychological-hook" style="margin-bottom: 20px; border-bottom: 1px solid #f0f0f0; padding-bottom: 15px;">
      <p style="font-size: 14px; color: #666; line-height: 1.6; margin: 0;">
        방금 확인한 <strong>${r.type}</strong>가 당신의 모습과 닮았나요?<br>
        로컬에서 나만의 속도로 걷고 있는 수많은 '얘, 쟤, 걔'들이 매주 한곳에 모여 <strong>내 일(Job)</strong>과 <strong>내일(Tomorrow)</strong>을 이야기하고 있어요.
      </p>
    </div>
    <h3 style="font-size: 18px; color: #222; margin-bottom: 15px; line-height: 1.4;">
      "막막한 <span style="color: #007bff;">내일</span>이 걱정된다면,<br>
      함께 <span style="color: #007bff;">내 일</span>을 찾아볼까요?"
    </h3>
    <a href="https://omggdongne.stibee.com/" target="_blank"
       style="display: block; width: 100%; padding: 15px 0; background-color: #000; color: #fff; text-decoration: none; border-radius: 8px; font-weight: bold; text-align: center; font-size: 16px;">
       뉴스레터 '내;일이 걱정이야' 무료 구독하기
    </a>
    <p style="font-size: 12px; color: #999; margin-top: 12px; text-align: center;">
      * 매주 화요일 아침, 로컬 청년들의 일 이야기를 보내드려요.
    </p>
  </div>
  <button class="restart-btn" onclick="restart()">↩ 다시 테스트하기</button>`;
}
function restart(){
  cur=0; ans=new Array(10).fill(null);
  document.getElementById("result-page").classList.add("hidden");
  document.getElementById("result-page").innerHTML="";
  const ip=document.getElementById("intro-page");
  ip.classList.remove("hidden"); ip.classList.add("fade-in");
}
</script>
</body>
</html>
